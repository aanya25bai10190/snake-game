<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aesthetic Snake</title>
    <style>
        :root {
            --bg-color: #f4f1ea;
            --canvas-bg: #143d44;
            --grid-line: rgba(255, 255, 255, 0.06);
            --text-color: #2c4246;
            --snake-head: #64dfdf;
            --snake-tail: #ff758f;
            --food-color: #ffb703;
            --shadow: 0 20px 40px rgba(0,0,0,0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #faf8f5;
            padding: 30px;
            border-radius: 24px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(0,0,0,0.03);
        }

        .header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-weight: bold;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }

        .score-box {
            text-transform: uppercase;
            opacity: 0.8;
        }

        .canvas-wrapper {
            position: relative;
            background-color: var(--canvas-bg);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: inset 0 4px 20px rgba(0,0,0,0.3);
        }

        canvas {
            display: block;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(20, 61, 68, 0.85);
            backdrop-filter: blur(4px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            opacity: 1;
            transition: opacity 0.3s ease;
            border-radius: 20px;
        }

        .overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .overlay h2 {
            font-size: 2rem;
            margin-bottom: 15px;
            letter-spacing: 2px;
            color: var(--snake-head);
            text-shadow: 0 0 10px rgba(100, 223, 223, 0.5);
        }

        .overlay p {
            font-size: 1rem;
            opacity: 0.8;
            margin-bottom: 25px;
        }

        .btn {
            background: #fff;
            color: var(--canvas-bg);
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s, background 0.2s;
        }

        .btn:hover {
            transform: scale(1.05);
            background: var(--snake-head);
            color: #fff;
        }

        .footer {
            margin-top: 25px;
            font-size: 0.9rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            opacity: 0.6;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="header">
            <div class="score-box">Score: <span id="score">00000</span></div>
            <div class="score-box">High Score: <span id="high-score">00000</span></div>
        </div>

        <div class="canvas-wrapper">
            <canvas id="gameCanvas" width="600" height="360"></canvas>
            
            <div id="gameOverlay" class="overlay">
                <h2 id="overlayTitle">AESTHETIC SNAKE</h2>
                <p id="overlayText">Press Space or click Start to play</p>
                <button class="btn" id="startBtn">START GAME</button>
            </div>
        </div>

        <div class="footer">Aesthetic Snake</div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('high-score');
        const overlay = document.getElementById('gameOverlay');
        const overlayTitle = document.getElementById('overlayTitle');
        const overlayText = document.getElementById('overlayText');
        const startBtn = document.getElementById('startBtn');

        // Grid Configuration
        const gridSize = 20;
        const tileCountX = canvas.width / gridSize;
        const tileCountY = canvas.height / gridSize;

        // Game State Variables
        let snake = [];
        let food = { x: 0, y: 0 };
        let dx = gridSize;
        let dy = 0;
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameInterval = null;
        let isRunning = false;
        let nextDirection = { x: gridSize, y: 0 };

        // Formatting utilities
        function formatScore(num) {
            return String(num).padStart(5, '0');
        }

        highScoreEl.textContent = formatScore(highScore);

        // Core Game Loop Controls
        function initGame() {
            snake = [
                { x: gridSize * 5, y: gridSize * 5 },
                { x: gridSize * 4, y: gridSize * 5 },
                { x: gridSize * 3, y: gridSize * 5 }
            ];
            dx = gridSize;
            dy = 0;
            nextDirection = { x: gridSize, y: 0 };
            score = 0;
            scoreEl.textContent = formatScore(score);
            spawnFood();
        }

        function startGame() {
            initGame();
            overlay.classList.add('hidden');
            isRunning = true;
            if (gameInterval) clearInterval(gameInterval);
            gameInterval = setInterval(update, 100);
        }

        function gameOver() {
            isRunning = false;
            clearInterval(gameInterval);
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                highScoreEl.textContent = formatScore(highScore);
            }
            overlayTitle.textContent = "GAME OVER";
            overlayText.textContent = `You scored ${score} points!`;
            startBtn.textContent = "TRY AGAIN";
            overlay.classList.remove('hidden');
        }

        function spawnFood() {
            food.x = Math.floor(Math.random() * tileCountX) * gridSize;
            food.y = Math.floor(Math.random() * tileCountY) * gridSize;
            
            // Re-roll if food spawns inside the snake
            for (let part of snake) {
                if (part.x === food.x && part.y === food.y) {
                    spawnFood();
                    break;
                }
            }
        }

        // Logic Updates
        function update() {
            // Commit direction change safely per frame
            dx = nextDirection.x;
            dy = nextDirection.y;

            // Move Head
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            // Wall Collision Checks
            if (head.x < 0 || head.x >= canvas.width || head.y < 0 || head.y >= canvas.height) {
                return gameOver();
            }

            // Self Collision Checks
            for (let i = 0; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    return gameOver();
                }
            }

            // Add new head
            snake.unshift(head);

            // Food collision check
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.textContent = formatScore(score);
                spawnFood();
            } else {
                // Remove tail segment if food wasn't consumed
                snake.pop();
            }

            draw();
        }

        // Rendering Engine
        function draw() {
            // Clear canvas
            ctx.fillStyle = '#143d44';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Background Grid Matrix
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.04)';
            ctx.lineWidth = 1;
            for (let i = 0; i < canvas.width; i += gridSize) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, canvas.height);
                ctx.stroke();
            }
            for (let j = 0; j < canvas.height; j += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, j);
                ctx.lineTo(canvas.width, j);
                ctx.stroke();
            }

            // Draw Aesthetic Food (Glowing Diamond Crystal)
            ctx.save();
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#ffb703';
            ctx.fillStyle = '#ffb703';
            ctx.beginPath();
            const centerX = food.x + gridSize / 2;
            const centerY = food.y + gridSize / 2;
            ctx.moveTo(centerX, food.y + 3);
            ctx.lineTo(food.x + gridSize - 3, centerY);
            ctx.lineTo(centerX, food.y + gridSize - 3);
            ctx.lineTo(food.x + 3, centerY);
            ctx.closePath();
            ctx.fill();
            ctx.restore();

            // Draw Gradient Glowing Snake
            for (let i = 0; i < snake.length; i++) {
                const part = snake[i];
                
                // Calculate color interpolation percent down the length of the snake body
                const t = i / Math.max(1, snake.length - 1);
                
                ctx.save();
                ctx.shadowBlur = i === 0 ? 12 : 6;
                ctx.shadowColor = i === 0 ? '#64dfdf' : '#ff758f';

                // Gradient Shift Injection
                const gradient = ctx.createLinearGradient(part.x, part.y, part.x + gridSize, part.y + gridSize);
                if (i === 0) {
                    gradient.addColorStop(0, '#64dfdf');
                    gradient.addColorStop(1, '#48cae4');
                } else {
                    gradient.addColorStop(0, '#72efdd');
                    gradient.addColorStop(1, '#ff758f');
                }

                ctx.fillStyle = gradient;
                
                // Draw rounded smooth snake nodes
                ctx.beginPath();
                const radius = i === 0 ? 8 : 6; // slightly tapered tail
                ctx.roundRect(part.x + 1, part.y + 1, gridSize - 2, gridSize - 2, radius);
                ctx.fill();
                
                // Draw eyes on the head node
                if (i === 0) {
                    ctx.fillStyle = '#fff';
                    ctx.shadowBlur = 0;
                    
                    // Render subtle responsive eyes depending on moving direction
                    if (dx > 0) { // Right
                        ctx.fillRect(part.x + 12, part.y + 4, 3, 3);
                        ctx.fillRect(part.x + 12, part.y + 12, 3, 3);
                    } else if (dx < 0) { // Left
                        ctx.fillRect(part.x + 4, part.y + 4, 3, 3);
                        ctx.fillRect(part.x + 4, part.y + 12, 3, 3);
                    } else if (dy > 0) { // Down
                        ctx.fillRect(part.x + 4, part.y + 12, 3, 3);
                        ctx.fillRect(part.x + 12, part.y + 12, 3, 3);
                    } else if (dy < 0) { // Up
                        ctx.fillRect(part.x + 4, part.y + 4, 3, 3);
                        ctx.fillRect(part.x + 12, part.y + 4, 3, 3);
                    }
                }
                ctx.restore();
            }
        }

        // Handle Keyboard Controls Inputs
        function handleKeyDown(e) {
            const key = e.key;
            
            if (key === ' ' && !isRunning) {
                startGame();
                return;
            }

            const goingUp = dy === -gridSize;
            const goingDown = dy === gridSize;
            const goingRight = dx === gridSize;
            const goingLeft = dx === -gridSize;

            if ((key === 'ArrowLeft' || key === 'a' || key === 'A') && !goingRight) {
                nextDirection = { x: -gridSize, y: 0 };
            }
            if ((key === 'ArrowUp' || key === 'w' || key === 'W') && !goingDown) {
                nextDirection = { x: 0, y: -gridSize };
            }
            if ((key === 'ArrowRight' || key === 'd' || key === 'D') && !goingLeft) {
                nextDirection = { x: gridSize, y: 0 };
            }
            if ((key === 'ArrowDown' || key === 's' || key === 'S') && !goingUp) {
                nextDirection = { x: 0, y: gridSize };
            }
        }

        // Event Listeners
        window.addEventListener('keydown', handleKeyDown);
        startBtn.addEventListener('click', startGame);

        // Initial setup visual draw
        initGame();
        draw();
    </script>
</body>
</html>
