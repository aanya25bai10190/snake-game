<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Serpent</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="game-container">

    <div class="header">
        <div class="score-box">Score: <span id="score">00000</span></div>
        <div class="score-box">High Score: <span id="high-score">00000</span></div>
    </div>

    <div class="canvas-wrapper">
        <canvas id="gameCanvas" width="600" height="360"></canvas>

        <div id="overlay" class="overlay">
            <h1 id="overlayTitle">NEON SERPENT</h1>
            <p id="overlayText">Press Space or Start</p>
            <button id="startBtn">START GAME</button>
        </div>
    </div>

    <div class="footer">minimal • smooth • addictive</div>

</div>

<script type="module" src="./js/main.js"></script>
</body>
</html>
